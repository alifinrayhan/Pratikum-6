<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100">

<div class="min-h-screen flex items-center justify-center p-4 md:p-0">
    <div class="max-w-4xl w-full bg-white rounded-[2rem] overflow-hidden shadow-2xl flex flex-col md:flex-row min-h-[600px]">

        <div class="hidden md:flex md:w-1/2 bg-indigo-600 relative overflow-hidden flex-col justify-between p-12 text-white">
            <div class="absolute -top-20 -left-20 w-64 h-64 bg-indigo-500 rounded-full opacity-50"></div>
            <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-indigo-400 rounded-full opacity-30"></div>

            <div class="relative z-10">
                <h1 class="text-3xl font-bold tracking-tight">CreativeSpace.</h1>
            </div>

            <div class="relative z-10">
                <blockquote class="text-2xl font-light italic leading-relaxed">
                    "Setiap data punya cerita, setiap klik punya makna."
                </blockquote>
                <div class="mt-4 h-1 w-12 bg-indigo-300"></div>
            </div>

            <div class="relative z-10 text-sm text-indigo-100">
                &copy; 2026 Creative Dashboard Team.
            </div>
        </div>

        <div class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-center">
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-slate-800">Halo! 👋</h2>
                <p class="text-slate-500 mt-2">Silakan masuk untuk mengelola data Anda.</p>
            </div>

            <form th:action="@{/form}" method="get" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700 ml-1">Username</label>
                    <input type="text" placeholder="Masukkan username" required
                           class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all duration-200 text-slate-600 placeholder:text-slate-400">
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-sm font-semibold text-slate-700">Password</label>
                        <a href="#" class="text-xs text-indigo-600 hover:underline">Lupa Password?</a>
                    </div>
                    <input type="password" placeholder="••••••••" required
                           class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all duration-200 text-slate-600">
                </div>

                <button type="submit"
                        class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:translate-y-[-2px] active:scale-[0.98] transition-all duration-200">
                    Login Sekarang
                </button>
            </form>

            <p class="text-center mt-8 text-slate-500 text-sm">
                Belum punya akun? <a href="#" class="text-indigo-600 font-bold hover:underline">Daftar</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
