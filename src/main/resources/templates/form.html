<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Bagikan Inspirasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

<div class="max-w-xl w-full">
    <a href="/home" class="inline-flex items-center text-sm text-slate-500 hover:text-indigo-600 mb-6 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Kembali ke Beranda
    </a>

    <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/60 p-8 md:p-12 border border-slate-100">
        <header class="mb-10 text-center">
            <h2 class="text-3xl font-bold text-slate-900">Form Pendaftaran</h2>
            <p class="text-slate-500 mt-2">Bagikan kutipan keren dan foto terbaikmu.</p>
        </header>

        <form th:action="@{/submitForm}" th:object="${user}" method="post" enctype="multipart/form-data" class="space-y-8">

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Username</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            @
                        </span>
                    <input type="text" th:field="*{username}" placeholder="rachmat_alifin" required
                           class="w-full pl-10 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-slate-600">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Upload Foto</label>
                <div class="relative border-2 border-dashed border-slate-200 rounded-2xl p-8 hover:border-indigo-400 hover:bg-indigo-50/30 transition-all text-center group">
                    <input type="file" name="fileFoto" accept="image/*" required
                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="space-y-2">
                        <div class="bg-indigo-100 text-indigo-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <p class="text-sm text-slate-600 font-medium">Klik untuk upload foto</p>
                        <p class="text-xs text-slate-400 italic">PNG, JPG up to 5MB</p>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Kata-kata Mutiara</label>
                <textarea th:field="*{kataKata}" rows="4" placeholder="Tuliskan sesuatu yang menginspirasi..."
                          class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-slate-600 resize-none"></textarea>
            </div>

            <button type="submit"
                    class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-slate-300 hover:bg-indigo-600 hover:translate-y-[-3px] transition-all duration-300">
                Kirim Data
            </button>

        </form>
    </div>

    <p class="text-center mt-8 text-slate-400 text-xs">
        Pastikan data yang Anda masukkan sudah benar sebelum menekan tombol kirim.
    </p>
</div>

</body>
</html>
