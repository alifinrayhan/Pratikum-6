<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Creative Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
            Data Hub
        </h1>
        <div class="flex items-center gap-6">
            <a href="/form" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
                + Tambah Data
            </a>
            <a href="/logout" class="text-slate-500 hover:text-red-600 transition text-sm">Logout</a>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-12">
    <header class="mb-12">
        <h2 class="text-4xl font-bold text-slate-900">Selamat Datang!</h2>
        <p class="text-slate-500 mt-2 text-lg">Inspirasi dan data yang telah dikumpulkan komunitas.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

        <div th:each="mhs : ${listMhs}" class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 group">
            <div class="relative h-64 overflow-hidden">
                <img th:src="@{'/images/' + ${mhs.foto}}"
                     class="w-full h-full object-cover group-hover:scale-110 transition duration-500"
                     alt="User Photo">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                <div class="absolute bottom-4 left-6">
                    <p class="text-white font-bold text-xl" th:text="${mhs.username}"></p>
                    <p class="text-indigo-200 text-xs" th:text="${mhs.email}"></p>
                </div>
            </div>

            <div class="p-6">
                <div class="flex items-start gap-2">
                    <span class="text-4xl text-indigo-200 font-serif">“</span>
                    <p class="text-slate-600 italic leading-relaxed pt-2" th:text="${mhs.kataKata}"></p>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-50 bg-slate-50/50 flex justify-end">
                <button class="text-indigo-600 text-sm font-semibold hover:underline">Detail Profile</button>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(listMhs)}" class="col-span-full py-20 text-center">
            <div class="text-6xl mb-4">📂</div>
            <h3 class="text-xl font-semibold text-slate-400">Belum ada data yang dimasukkan.</h3>
        </div>

    </div>
</main>

</body>
</html>
